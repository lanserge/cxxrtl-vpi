# SPDX-License-Identifier: ISC
name: ci
on: [push, pull_request]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Yosys + build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y yosys cmake build-essential
          yosys --version

      - name: Smoke test (toolchain + provider build + write_cxxrtl)
        run: bash tests/test_smoke.sh

      - name: Functional MVP test (VPI handle/get/put on a counter)
        run: bash tests/run_getput.sh

      - name: Callback/time test (cocotb-style clock + edges + finish)
        run: bash tests/run_callbacks.sh

      - name: Hierarchy-discovery test (vpi_iterate/scan/handle)
        run: bash tests/run_hierarchy.sh

      - name: End-to-end cocotb test (unmodified testbench on CXXRTL)
        run: |
          python -m pip install --upgrade pip
          python -m pip install cocotb
          PYTHON=python bash examples/cocotb_counter/run_cocotb.sh | tee cocotb.log
          grep -q "PASS=1 FAIL=0" cocotb.log
